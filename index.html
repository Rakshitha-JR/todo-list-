<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goals Todo Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<header>
<h1>Goals Dashboard</h1>
<button id="themeToggle">🌙</button>
</header>

<div class="dashboard">

<div class="card">
<h3>Total</h3>
<p id="totalTasks">0</p>
</div>

<div class="card">
<h3>Completed</h3>
<p id="completedTasks">0</p>
</div>

<div class="card">
<h3>Remaining</h3>
<p id="remainingTasks">0</p>
</div>

<div class="card">
<h3>Daily Goals</h3>
<p id="dailyTasks">0</p>
</div>

<div class="card">
<h3>Weekly Goals</h3>
<p id="weeklyTasks">0</p>
</div>

</div>

<div class="input-section">

<input type="text" id="taskInput" placeholder="Add new goal">

<select id="taskType">
<option value="daily">Daily</option>
<option value="weekly">Weekly</option>
</select>

<button onclick="addTask()">Add</button>

</div>

<input type="text" id="searchInput" placeholder="Search tasks..." onkeyup="searchTasks()">

<div class="filters">

<button onclick="filterTasks('all')">All</button>
<button onclick="filterTasks('active')">Active</button>
<button onclick="filterTasks('completed')">Completed</button>

</div>

<div class="progress">
<div id="progressBar"></div>
</div>

<ul id="taskList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
